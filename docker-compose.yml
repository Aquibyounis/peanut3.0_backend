# ============================================================
# DEV ONLY – Production uses cloud managed services:
#   PostgreSQL: Neon
#   Redis: Upstash
#   Qdrant: Qdrant Cloud
#   Events: Upstash QStash (replaces Kafka)
# ============================================================

version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: peanut_postgres
    restart: always
    environment:
      POSTGRES_USER: peanut
      POSTGRES_PASSWORD: peanut
      POSTGRES_DB: peanut_db
    ports:
      - "5432:5432"
    volumes:
      - peanut_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: peanut_redis
    ports:
      - "6379:6379"
    volumes:
      - peanut_redis_data:/data

  qdrant:
    image: qdrant/qdrant
    container_name: peanut_qdrant
    ports:
      - "6333:6333"
    volumes:
      - peanut_qdrant_data:/qdrant/storage

volumes:
  peanut_postgres_data:
  peanut_redis_data:
  peanut_qdrant_data: